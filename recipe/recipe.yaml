schema_version: 1

context:
  name: tinyflux
  version: "1.2.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/tinyflux-${{ version }}.tar.gz
  sha256: 727a069ea8e4946c7c607005d7637b9ca48a4e47a7f7b7d5fb39b3b30a4e1dc3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=42
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - tinyflux
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: The Tiny Time-Series Database Optimized for Your Happiness
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/citrusvanilla/tinyflux

extra:
  recipe-maintainers:
    - thewchan
